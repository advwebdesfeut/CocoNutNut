<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = path.split('/').slice(0, 2).join('/') + '/?p=' + 
        path.slice(1).split('/').slice(1).join('/') + 
        (search ? '&q=' + search.slice(1) : '') + 
        hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body>
  </body>
</html>
